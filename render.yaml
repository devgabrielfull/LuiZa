services:
  - type: web
    name: luiza-backend
    env: node
    rootDir: backend
    buildCommand: |
      apt-get update -qq
      apt-get install -y python3 python3-pip ffmpeg
      pip3 install --upgrade pip
      pip3 install pytubefix==6.16.1 pydub==0.25.1
      npm install
    startCommand: node server.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /
